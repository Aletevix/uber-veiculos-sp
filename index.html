* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; color: #e8e8e8; }

header { background: #1a1a1a; border-bottom: 2px solid #F5A623; padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
header h1 { font-size: 1.3rem; font-weight: 700; color: #fff; }
.header-badges { display: flex; gap: 8px; }
.badge-black { background: #000; border: 1px solid #555; color: #fff; font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
.badge-comfort { background: #1B2D5B; color: #F5A623; font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; }

.controls { padding: 16px 28px; background: #141414; border-bottom: 1px solid #222; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.search-box input { padding: 9px 14px; background: #222; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 0.9rem; outline: none; width: 240px; }
.search-box input:focus { border-color: #F5A623; }
.tab-btns { display: flex; gap: 6px; }
.tab-btn { padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
.tab-black { background: #222; color: #aaa; border: 1px solid #333; }
.tab-black.active { background: #111; color: #fff; border-color: #fff; }
.tab-comfort { background: #222; color: #aaa; border: 1px solid #333; }
.tab-comfort.active { background: #1B2D5B; color: #F5A623; border-color: #F5A623; }
.tab-all { background: #222; color: #aaa; border: 1px solid #333; }
.tab-all.active { background: #F5A623; color: #000; border-color: #F5A623; }

.stats { padding: 10px 28px; background: #111; font-size: 0.82rem; color: #555; border-bottom: 1px solid #1a1a1a; }
.stats span { color: #F5A623; font-weight: 700; }

.grid { padding: 20px 28px; display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; }

.brand-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; overflow: hidden; }
.brand-header { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
.brand-header.has-black { background: #1e1e1e; border-bottom: 2px solid #333; }
.brand-header.has-comfort { background: #1a1f2e; border-bottom: 2px solid #1B2D5B; }
.brand-header.has-both { background: #1e1e1e; border-bottom: 2px solid #333; }
.brand-name { font-weight: 700; font-size: 0.95rem; color: #fff; }
.brand-count { font-size: 0.72rem; color: #888; }

.model-item { padding: 7px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e1e1e; font-size: 0.84rem; }
.model-item:last-child { border-bottom: none; }
.model-name { color: #ddd; flex: 1; }
.tags { display: flex; gap: 4px; align-items: center; }
.tag-black { background: #222; color: #ccc; border: 1px solid #444; font-size: 0.68rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
.tag-comfort { background: #1B2D5B; color: #F5A623; font-size: 0.68rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
.tag-year { color: #F5A623; font-size: 0.72rem; font-weight: 600; white-space: nowrap; margin-left: 4px; }
.tag-year.special { color: #ff9944; }

.no-results { grid-column: 1/-1; text-align: center; padding: 50px; color: #444; }
footer { padding: 16px 28px; text-align: center; color: #444; font-size: 0.78rem; border-top: 1px solid #1a1a1a; }
footer a { color: #F5A623; text-decoration: none; }
</style>

// Agrupar por marca
const brands = {};
raw.forEach(([brand, model, cat]) => {
  if (!brands[brand]) brands[brand] = [];
  brands[brand].push({ model, cat });
});

let currentTab = 'all';

function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function yearLabel(cat) {
  if (cat === 'black_2023') return '2023+';
  if (cat === 'black_2025') return '2025+';
  return '2019+';
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  let totalBlack = 0, totalComfort = 0, shown = 0;

  Object.entries(brands).forEach(([brand, models]) => {
    let filtered = models;

    // Filtro de busca
    if (q) filtered = filtered.filter(m => m.model.toLowerCase().includes(q) || brand.toLowerCase().includes(q));

    // Filtro de tab
    if (currentTab === 'black') filtered = filtered.filter(m => m.cat !== 'comfort_only');
    if (currentTab === 'comfort') filtered = filtered.filter(m => m.cat === 'comfort_only');

    if (!filtered.length) return;

    const hasBlack = filtered.some(m => m.cat !== 'comfort_only');
    const hasComfort = filtered.some(m => m.cat === 'comfort_only');

    shown += filtered.length;
    filtered.forEach(m => m.cat !== 'comfort_only' ? totalBlack++ : totalComfort++);

    const headerClass = hasBlack && hasComfort ? 'has-both' : hasBlack ? 'has-black' : 'has-comfort';

    const card = document.createElement('div');
    card.className = 'brand-card';
    card.innerHTML = `
      <div class="brand-header ${headerClass}">
        <span class="brand-name">${brand}</span>
        <span class="brand-count">${filtered.length} modelo${filtered.length>1?'s':''}</span>
      </div>
      <div>
        ${filtered.map(m => `
          <div class="model-item">
            <span class="model-name">${m.model}</span>
            <div class="tags">
              ${m.cat !== 'comfort_only' 
                ? `<span class="tag-black">BLACK</span><span class="tag-year ${m.cat !== 'black' ? 'special' : ''}">mín. ${yearLabel(m.cat)}</span>`
                : `<span class="tag-comfort">COMFORT</span>`}
            </div>
          </div>`).join('')}
      </div>`;
    grid.appendChild(card);
  });

  if (!shown) grid.innerHTML = '<div class="no-results">Nenhum modelo encontrado.</div>';

  document.getElementById('cnt').textContent = shown;
  document.getElementById('hdr-black').textContent = `⬛ Black: ${totalBlack}`;
  document.getElementById('hdr-comfort').textContent = `🔵 Só Comfort: ${totalComfort}`;
  document.getElementById('stats').innerHTML = `Mostrando <span>${shown}</span> modelos — <span>${totalBlack}</span> com Black · <span>${totalComfort}</span> só Comfort`;
}

render();
</script>
