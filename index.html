<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yalla Car — Veículos Uber SP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1B2D5B;
  --gold: #F5A623;
  --bg: #080C14;
  --surface: #0D1421;
  --surface2: #111827;
  --border: #1E2D47;
  --text: #E2E8F0;
  --muted: #64748B;
  --black-cat: #F8FAFC;
  --comfort-cat: #F5A623;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* GRID BACKGROUND */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: linear-gradient(rgba(27,45,91,0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(27,45,91,0.08) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}

/* HEADER */
header {
  position: relative; z-index: 10;
  background: linear-gradient(135deg, #0A1628 0%, #0D1F3C 100%);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  display: flex; align-items: center; justify-content: space-between;
  height: 72px;
  backdrop-filter: blur(20px);
}
header::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), var(--navy), var(--gold), transparent);
}
.logo-wrap img { height: 38px; object-fit: contain; }
.header-right { display: flex; align-items: center; gap: 16px; }
.live-badge {
  display: flex; align-items: center; gap: 6px;
  background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.3);
  padding: 5px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; color: var(--gold);
}
.live-dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
.city-tag { background: var(--navy); color: #fff; padding: 5px 14px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em; }

/* HERO STATS */
.hero {
  position: relative; z-index: 5;
  padding: 36px 40px 28px;
  display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 24px;
}
.hero-title h2 { font-size: 1.8rem; font-weight: 900; color: #fff; line-height: 1.1; letter-spacing: -0.02em; }
.hero-title h2 span { color: var(--gold); }
.hero-title p { color: var(--muted); font-size: 0.85rem; margin-top: 6px; }
.stat-cards { display: flex; gap: 12px; flex-wrap: wrap; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 20px; min-width: 120px;
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.stat-card.s-black::before { background: linear-gradient(90deg, #333, #888, #333); }
.stat-card.s-comfort::before { background: linear-gradient(90deg, var(--navy), var(--gold), var(--navy)); }
.stat-card.s-total::before { background: linear-gradient(90deg, var(--gold), #fff, var(--gold)); }
.stat-num { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; }
.s-black .stat-num { color: #fff; }
.s-comfort .stat-num { color: var(--gold); }
.s-total .stat-num { color: var(--gold); }
.stat-label { font-size: 0.72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

/* CONTROLS */
.controls {
  position: relative; z-index: 5;
  padding: 0 40px 20px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.search-wrap { position: relative; flex: 1; min-width: 220px; max-width: 360px; }
.search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.4; }
.search-wrap input {
  width: 100%; padding: 11px 14px 11px 40px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 0.88rem; outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--gold); }
.search-wrap input::placeholder { color: var(--muted); }

.tabs { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 3px; gap: 3px; }
.tab {
  padding: 8px 20px; border-radius: 7px; border: none; cursor: pointer;
  font-size: 0.82rem; font-weight: 700; transition: all 0.2s;
  background: transparent; color: var(--muted); letter-spacing: 0.02em;
}
.tab:hover { color: var(--text); }
.tab.active-all { background: var(--gold); color: #000; }
.tab.active-black { background: #1a1a2e; color: #fff; border: 1px solid #333; }
.tab.active-comfort { background: var(--navy); color: var(--gold); }

.result-info { margin-left: auto; font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
.result-info span { color: var(--gold); font-weight: 700; }

/* GRID */
.grid-wrap { position: relative; z-index: 5; padding: 0 40px 40px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }

/* CARDS */
.brand-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
}
.brand-card:hover { transform: translateY(-2px); border-color: rgba(245,166,35,0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }

.brand-hdr {
  padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
  background: var(--surface2); position: relative; overflow: hidden;
}
.brand-hdr::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
}
.hdr-black .brand-hdr::after { background: linear-gradient(90deg, transparent, #334, transparent); }
.hdr-comfort .brand-hdr::after { background: linear-gradient(90deg, transparent, var(--navy), transparent); }
.hdr-both .brand-hdr::after { background: linear-gradient(90deg, transparent, var(--gold), transparent); }

.brand-icon {
  width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 900; letter-spacing: -0.03em; margin-right: 10px; flex-shrink: 0;
}
.hdr-black .brand-icon { background: #1a1a2e; color: #aaa; border: 1px solid #333; }
.hdr-comfort .brand-icon { background: rgba(27,45,91,0.5); color: var(--gold); border: 1px solid var(--navy); }
.hdr-both .brand-icon { background: rgba(245,166,35,0.1); color: var(--gold); border: 1px solid rgba(245,166,35,0.3); }

.brand-info { flex: 1; min-width: 0; }
.brand-name { font-weight: 700; font-size: 0.9rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.brand-sub { font-size: 0.68rem; color: var(--muted); margin-top: 1px; }

.count-pill { background: rgba(255,255,255,0.05); color: var(--muted); font-size: 0.7rem; font-weight: 700; padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border); white-space: nowrap; }

.model-list { padding: 4px 0; }
.model-row {
  padding: 7px 16px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.82rem; gap: 8px;
  transition: background 0.1s;
}
.model-row:last-child { border-bottom: none; }
.model-row:hover { background: rgba(255,255,255,0.02); }
.model-name { color: #CBD5E1; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 0.67rem; font-weight: 800; padding: 3px 8px; border-radius: 5px;
  white-space: nowrap; letter-spacing: 0.05em; text-transform: uppercase;
}
.tag-b { background: #111827; color: #94A3B8; border: 1px solid #1E293B; }
.tag-c { background: rgba(27,45,91,0.6); color: var(--gold); border: 1px solid rgba(27,45,91,0.8); }
.year-badge { font-size: 0.67rem; font-weight: 700; color: var(--gold); background: rgba(245,166,35,0.08); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(245,166,35,0.2); white-space: nowrap; }
.year-special { color: #ff9944; border-color: rgba(255,153,68,0.3); background: rgba(255,153,68,0.08); }

.no-result { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); }
.no-result svg { opacity: 0.2; margin-bottom: 12px; }

footer {
  position: relative; z-index: 5;
  border-top: 1px solid var(--border); padding: 16px 40px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  font-size: 0.75rem; color: var(--muted);
}
footer a { color: var(--gold); text-decoration: none; }
.footer-logo img { height: 22px; opacity: 0.5; }

@media (max-width: 600px) {
  header, .hero, .controls, .grid-wrap, footer { padding-left: 16px; padding-right: 16px; }
  .hero-title h2 { font-size: 1.3rem; }
  .grid { grid-template-columns: 1fr; }
}
</style>

const brands = {};
raw.forEach(([b,m,c]) => { if(!brands[b]) brands[b]=[]; brands[b].push({m,c}); });

let tab = 'all';
function setTab(t) {
  tab = t;
  ['all','black','comfort'].forEach(x => {
    const el = document.getElementById('tab-'+x);
    el.className = 'tab';
    if(x===t) el.className = 'tab active-'+x;
  });
  render();
}

function yearLabel(c) {
  if(c==='black_2023') return 'mín. 2023';
  if(c==='black_2025') return 'mín. 2025';
  return 'mín. 2019';
}
function isSpecial(c) { return c==='black_2023'||c==='black_2025'; }

function initials(brand) {
  return brand.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  let cnt=0, cntB=0, cntC=0;

  Object.entries(brands).forEach(([brand, models]) => {
    let filtered = models;
    if(q) filtered = filtered.filter(({m,c}) => m.toLowerCase().includes(q) || brand.toLowerCase().includes(q));
    if(tab==='black') filtered = filtered.filter(({c}) => c!=='comfort_only');
    if(tab==='comfort') filtered = filtered.filter(({c}) => c==='comfort_only');
    if(!filtered.length) return;

    const hB = filtered.some(({c})=>c!=='comfort_only');
    const hC = filtered.some(({c})=>c==='comfort_only');
    const hdrClass = hB&&hC?'hdr-both':hB?'hdr-black':'hdr-comfort';

    cnt += filtered.length;
    filtered.forEach(({c}) => c!=='comfort_only'?cntB++:cntC++);

    const card = document.createElement('div');
    card.className = 'brand-card';

    const blackCount = filtered.filter(({c})=>c!=='comfort_only').length;
    const comfortCount = filtered.filter(({c})=>c==='comfort_only').length;
    let subParts = [];
    if(blackCount) subParts.push(`${blackCount} Black`);
    if(comfortCount) subParts.push(`${comfortCount} Comfort`);

    card.innerHTML = `
      <div class="${hdrClass}">
        <div class="brand-hdr">
          <div class="brand-icon">${initials(brand)}</div>
          <div class="brand-info">
            <div class="brand-name">${brand}</div>
            <div class="brand-sub">${subParts.join(' · ')}</div>
          </div>
          <div class="count-pill">${filtered.length}</div>
        </div>
      </div>
      <div class="model-list">
        ${filtered.map(({m,c}) => `
          <div class="model-row">
            <span class="model-name">${m}</span>
            <div style="display:flex;align-items:center;gap:4px">
              ${c!=='comfort_only'
                ? `<span class="tag tag-b">BLACK</span><span class="year-badge ${isSpecial(c)?'year-special':''}">${yearLabel(c)}</span>`
                : `<span class="tag tag-c">COMFORT</span>`}
            </div>
          </div>`).join('')}
      </div>`;
    grid.appendChild(card);
  });

  if(!cnt) grid.innerHTML = '<div class="no-result"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><br>Nenhum modelo encontrado</div>';

  document.getElementById('cnt').textContent = cnt;
  document.getElementById('s-total').textContent = cnt;
  document.getElementById('s-black').textContent = cntB;
  document.getElementById('s-comfort').textContent = cntC;
}

render();
</script>
